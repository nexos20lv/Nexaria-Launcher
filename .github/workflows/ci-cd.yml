name: Build and Release Nexaria Launcher

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Generate data manifest
        run: |
          mvn -q -DskipTests compile
          java -cp target/classes com.nexaria.launcher.build.ManifestGeneratorMojo data data/data-manifest.json

      - name: Commit manifest if changed
        run: |
          if git status --porcelain | grep -q "data/data-manifest.json"; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add data/data-manifest.json
            git commit -m "chore: update data manifest [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Extract and increment version
        id: version
        run: |
          CURRENT_VER=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)
          echo "Current version: $CURRENT_VER"
          
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VER"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"
          
          NEW_PATCH=$((PATCH + 1))
          NEW_VER="${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          echo "New version: $NEW_VER"
          echo "VERSION=$NEW_VER" >> $GITHUB_ENV
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT
          
          mvn versions:set -DnewVersion=$NEW_VER -DgenerateBackupPoms=false
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pom.xml
          git commit -m "chore: bump version to $NEW_VER [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Sync launcherVersion in LauncherConfig.java
        run: |
          sed -i -E "s/(instance\.launcherVersion = \")[0-9]+\.[0-9]+\.[0-9]+/\1$VERSION/" src/main/java/com/nexaria/launcher/config/LauncherConfig.java
          if git status --porcelain | grep -q 'LauncherConfig.java'; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add src/main/java/com/nexaria/launcher/config/LauncherConfig.java
            git commit -m "chore: sync launcherVersion to $VERSION [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Create tag v${{ steps.version.outputs.version }}
        run: |
          if git tag -l | grep -q "^v${{ steps.version.outputs.version }}$"; then
            echo "Tag v$VERSION already exists"
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag -a v${{ steps.version.outputs.version }} -m "Release v${{ steps.version.outputs.version }}"
            git push origin v${{ steps.version.outputs.version }}
          fi

      - name: Build launcher with Maven
        run: mvn -B clean package -DskipTests --file pom.xml

      - name: Run tests
        run: mvn test
        continue-on-error: true

      - name: Calculate SHA-256
        id: sha256
        run: |
          SHASUM=$(sha256sum target/nexaria-launcher.jar | awk '{print $1}')
          echo "SHA256: $SHASUM"
          echo "hash=$SHASUM" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Nexaria Launcher v${{ steps.version.outputs.version }}
          body: |
            ## 🚀 Nexaria Launcher v${{ steps.version.outputs.version }}
            
            **SHA-256:** `${{ steps.sha256.outputs.hash }}`
            
            ### 📋 Installation
            ```bash
            # Télécharger
            wget https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/nexaria-launcher.jar
            
            # Vérifier (optionnel)
            echo "${{ steps.sha256.outputs.hash }}  nexaria-launcher.jar" | sha256sum -c
            
            # Lancer
            java -jar nexaria-launcher.jar
            ```
            
            ### 📦 Changements
            Voir l'historique des commits pour les détails.
          files: target/nexaria-launcher.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify success
        if: success()
        run: |
          echo "✅ Release v${{ steps.version.outputs.version }} créée avec succès !"
          echo "📦 JAR uploadé et SHA-256 calculé"
