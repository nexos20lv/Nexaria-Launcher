name: Build and Auto-Release Nexaria Launcher

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up JDK 21 (build)
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Extract and increment version
        id: version
        run: |
          # Extract current version
          CURRENT_VER=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)
          echo "Current version: $CURRENT_VER"
          
          # Parse version components (assuming semantic versioning: MAJOR.MINOR.PATCH)
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VER"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"
          
          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_VER="${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          echo "New version: $NEW_VER"
          echo "VERSION=$NEW_VER" >> $GITHUB_ENV
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT
          
          # Update pom.xml with new version
          mvn versions:set -DnewVersion=$NEW_VER -DgenerateBackupPoms=false
          
          # Commit version update
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pom.xml
          git commit -m "chore: bump version to $NEW_VER [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Sync launcherVersion in config.yml
        run: |
          sed -i -E "s/^launcherVersion:.*/launcherVersion: $VERSION/" config.yml || true
          if git status --porcelain | grep -q 'config.yml'; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add config.yml
            git commit -m "chore: sync launcherVersion to $VERSION [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Create tag v${{ steps.version.outputs.version }}
        run: |
          if git tag -l | grep -q "^v${{ steps.version.outputs.version }}$"; then
            echo "Tag v$VERSION already exists";
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag -a v${{ steps.version.outputs.version }} -m "Release v${{ steps.version.outputs.version }}"
            git push origin v${{ steps.version.outputs.version }}
          fi

      - name: Build launcher with Maven
        run: mvn -B -DskipTests package --file pom.xml

      - name: Create GitHub Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Nexaria Launcher v${{ steps.version.outputs.version }}
          body: |
            ## Nexaria Launcher v${{ steps.version.outputs.version }}
            
            Auto-published by GitHub Actions.
            
            - Built with Maven
            - See commit history for changes
          draft: false
          prerelease: false

      - name: Upload JAR to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: target/nexaria-launcher.jar
          asset_name: nexaria-launcher.jar
          asset_content_type: application/java-archive

